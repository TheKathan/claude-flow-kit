name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve, or why is it useful?
      placeholder: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
      placeholder: Describe the feature or change you'd like to see.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New language/framework support
        - Installer improvement
        - Workflow enhancement
        - Agent improvement
        - Documentation
        - CI/CD
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative approaches?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any extra details, mockups, or references.
